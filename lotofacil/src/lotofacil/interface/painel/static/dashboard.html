        <label style="font-size:0.68rem;color:var(--muted)">Últimos</label>
        <input type="number" id="backtestLastN" value="${_predState.backtestLastN}" min="10" max="500"
          style="width:52px;font-size:0.68rem;padding:1px 4px;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:3px">
        <label style="font-size:0.68rem;color:var(--muted)">sorteios</label>
        <button class="action-btn" onclick="_recalcBacktest()"
          style="font-size:0.68rem;padding:0.15rem 0.4rem">↻</button>
      </div>
    </div>`;
  if (qualidade.length === 0) {
    html += `<div style="color:var(--dim);font-size:0.78rem">Sem dados de qualidade. Execute o backtest primeiro.</div>`;
  } else {
    const sorted = [...qualidade].sort((a, b) => (b.mean_hits ?? 0) - (a.mean_hits ?? 0));
    html += `<div class="modelos-qualidade-grid">`;
    sorted.forEach((m, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-other';
      const hits = m.mean_hits != null ? m.mean_hits.toFixed(2) : '—';
      const pval = m.p_value  != null ? m.p_value.toFixed(4)   : '—';
      const std  = m.stability?.std_hits != null ? `±${m.stability.std_hits.toFixed(2)}` : '';
      const configKey   = m.model?.split('_').slice(-1)[0] || 'base';
      const configLabel = MODELO_CONFIG_LABELS[configKey] ?? m.model ?? '—';

      // hit distribution bars
      const dist = m.hit_distribution || {};
      const total = Object.values(dist).reduce((s, v) => s + v, 0) || 1;
      const distHtml = [11,12,13,14,15].map(k => {
        const count = dist[k] ?? dist[String(k)] ?? 0;
        const pct = Math.round(count / total * 100);
        const barW = Math.max(pct, count > 0 ? 3 : 0);
        return `<div style="display:flex;align-items:center;gap:4px;font-size:0.62rem;line-height:1.6">
          <span style="width:14px;text-align:right;color:var(--dim)">${k}</span>
          <div style="flex:1;background:rgba(255,255,255,0.07);border-radius:2px;height:6px;overflow:hidden">
            <div style="width:${barW}%;height:100%;background:var(--accent);border-radius:2px;opacity:0.8"></div>
          </div>
          <span style="width:28px;color:var(--muted)">${count}x</span>
        </div>`;
      }).join('');

      // baseline badge
      const imp = m.improvement_pct;
      const cls = m.classification || {};
      const impColor = imp > 0 ? 'var(--green)' : imp < 0 ? 'var(--red)' : 'var(--muted)';
      const impSign  = imp > 0 ? '+' : '';
      const baselineHtml = imp != null ? `
        <div style="margin-top:0.4rem;display:flex;align-items:center;gap:0.35rem;flex-wrap:wrap">
          <span style="font-size:0.62rem;color:var(--dim)">vs baseline</span>
          <span style="font-size:0.68rem;font-weight:700;color:${impColor}">${impSign}${imp.toFixed(1)}%</span>
          ${cls.label ? `<span style="font-size:0.6rem;padding:1px 5px;border-radius:3px;background:rgba(255,255,255,0.07);color:var(--muted)">${cls.label}</span>` : ''}
        </div>` : '';

      html += `<div class="modelo-card ${rankClass}">
        <span class="modelo-card-rank">#${rank}</span>
        <div class="modelo-card-name">${m.model ?? '—'}</div>
        <div class="modelo-hits">${hits}</div>
        <div class="modelo-hits-label">hits médios ${std ? `<span style="font-size:0.65rem">${std}</span>` : ''}</div>
        <div class="modelo-meta">
          <span class="modelo-meta-item">p=<strong>${pval}</strong></span>
          ${m.sample_size ? `<span class="modelo-meta-item">n=<strong>${m.sample_size}</strong></span>` : ''}
        </div>
        ${baselineHtml}
        <div style="margin-top:0.5rem;border-top:1px solid rgba(255,255,255,0.07);padding-top:0.4rem">${distHtml}</div>
        <span class="modelo-config-badge">${configLabel}</span>
      </div>`;
    });
    html += `</div>`;
  }
  html += `</div>`;

  // ── Treinos registrados ───────────────────────────────────
  const sk = _predState.listaSort.key;
  const sd = _predState.listaSort.dir;
  const sf = _predState.listaFiltroStatus;

  // count by status for badges
  const statusCounts = {};
  for (const m of modelos) statusCounts[m.status || 'running'] = (statusCounts[m.status || 'running'] || 0) + 1;
  const statusOpts = ['completed','running','failed','cancelled'];
  const badgesHtml = statusOpts
    .filter(s => statusCounts[s])
    .map(s => `<span onclick="_filtroLista('${s}')" style="cursor:pointer;font-size:0.62rem;padding:1px 6px;border-radius:10px;
      background:${sf===s?'var(--accent-dim)':'rgba(255,255,255,0.06)'};
      border:1px solid ${sf===s?'var(--accent)':'var(--border)'};color:${sf===s?'var(--accent)':'var(--muted)'}">
      ${s} ${statusCounts[s]}
    </span>`).join('');

  const sb = (_predState.listaBusca || '').toLowerCase();
  const filteredModelos = modelos
    .filter(m => !sf || (m.status || 'running') === sf)
    .filter(m => !sb || (m.nome || '').toLowerCase().includes(sb));
  const sortedModelos = [...filteredModelos].sort((a, b) => {
    let va, vb;
    if (sk === 'val_loss') { va = a.metricas?.val_loss_final ?? Infinity; vb = b.metricas?.val_loss_final ?? Infinity; }
    else if (sk === 'epochs') { va = a.metricas?.epochs_trained ?? 0; vb = b.metricas?.epochs_trained ?? 0; }
    else if (sk === 'status') { va = a.status || ''; vb = b.status || ''; }
    else if (sk === 'nome') { va = a.nome || ''; vb = b.nome || ''; }
    else { va = a.criado_em || ''; vb = b.criado_em || ''; }
    if (va < vb) return -sd; if (va > vb) return sd; return 0;
  });
  const thStyle = 'cursor:pointer;user-select:none';
  const sortIco = (k) => sk === k ? (sd > 0 ? ' ▲' : ' ▼') : '';

  const hasFailed = modelos.some(m => m.status === 'failed' || m.status === 'cancelled');
  html += `<div>
    <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-bottom:0.4rem">
      <div class="modelos-section-title" style="margin:0">Treinos Registrados</div>
      <div style="display:flex;gap:0.3rem;flex-wrap:wrap;margin-left:0.25rem">${badgesHtml}</div>
      ${sf ? `<button onclick="_filtroLista('')" style="font-size:0.6rem;padding:1px 5px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer">✕ limpar</button>` : ''}
      ${hasFailed ? `<button onclick="_limparFalhas()" style="font-size:0.6rem;padding:1px 6px;background:none;border:1px solid var(--red);border-radius:3px;color:var(--red);cursor:pointer;margin-left:auto">🗑 limpar falhas</button>` : ''}
    </div>
    <div style="margin-bottom:0.5rem">
      <input type="text" id="listaBuscaInput" value="${esc(_predState.listaBusca)}"
        oninput="_buscaLista(this.value)" placeholder="🔍 buscar por nome…"
        style="width:100%;max-width:280px;font-size:0.72rem;padding:0.2rem 0.5rem;
          background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
    </div>`;
  const page = _predState.listaPage || 0;
  const pageEnd = (page + 1) * LISTA_PAGE_SIZE;
  const pagedModelos = sortedModelos.slice(0, pageEnd);
  const remaining = sortedModelos.length - pageEnd;

  if (sortedModelos.length === 0) {
    html += `<div style="padding:2rem 0;text-align:center;color:var(--muted)">
      ${sf ? `Nenhum treino com status <b>${sf}</b>.` : 'Nenhum treino encontrado. Vá para <b>▶ Treinar</b> para iniciar.'}</div>`;
  } else {
    html += `<table class="pred-table"><thead><tr>
      <th style="${thStyle}" onclick="_sortLista('nome')">Nome${sortIco('nome')}</th>
      <th>Tipo</th>
      <th style="${thStyle}" onclick="_sortLista('val_loss')">Val Loss${sortIco('val_loss')}</th>
      <th style="${thStyle}" onclick="_sortLista('epochs')">Épocas${sortIco('epochs')}</th>
      <th style="${thStyle}" onclick="_sortLista('criado_em')">Data${sortIco('criado_em')}</th>
      <th style="${thStyle}" onclick="_sortLista('status')">Status${sortIco('status')}</th>
      <th></th>
    </tr></thead><tbody>`;
    for (const m of pagedModelos) {
      const met = m.metricas || {};
      const dt   = m.criado_em ? new Date(m.criado_em).toLocaleDateString('pt-BR') : '—';
      const loss = met.val_loss_final != null ? met.val_loss_final.toFixed(5) : '—';
      const ep   = met.epochs_trained != null ? met.epochs_trained : '—';
      const deleteLabel = m.status === 'running' ? '🗑 Cancelar e Apagar' : '🗑 Apagar';
      // training duration
      let durHtml = '';
      if (m.criado_em && m.concluido_em) {
        const ms = new Date(m.concluido_em) - new Date(m.criado_em);
        if (ms > 0) {
          const s = Math.floor(ms / 1000);
          const dur = s < 60 ? `${s}s` : s < 3600 ? `${Math.floor(s/60)}m${s%60?` ${s%60}s`:''}` : `${Math.floor(s/3600)}h${Math.floor((s%3600)/60)?` ${Math.floor((s%3600)/60)}m`:''}`;
          durHtml = `<br><span style="font-size:0.6rem;color:var(--dim)">⏱ ${dur}</span>`;
        }
      } else if (m.status === 'running') {
        durHtml = `<br><span style="font-size:0.6rem;color:var(--accent)">em andamento</span>`;
      }
      const isExpanded = _predState.expandedModelId === m.id;
      const expandIco = isExpanded ? '▲' : '▼';
      html += `<tr style="cursor:default">
        <td style="font-weight:600">
          <span style="cursor:pointer" onclick="_toggleModelExpand('${m.id}')">${expandIco} ${esc(m.nome)}</span>
          <span onclick="renomearModelo('${m.id}','${esc(m.nome)}')" title="Renomear"
            style="cursor:pointer;font-size:0.65rem;color:var(--dim);margin-left:4px;opacity:0.5"
            onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">✏</span>
        </td>
        <td style="color:var(--muted)">${esc(m.tipo_config||'')}</td>
        <td style="font-family:monospace">${loss}</td>
        <td>${ep}</td>
        <td style="color:var(--dim)">${dt}${durHtml}</td>
        <td><span class="pred-status ${m.status||'running'}">${m.status||'?'}</span></td>
        <td style="display:flex;gap:0.3rem;align-items:center;flex-wrap:wrap">
          ${m.status==='completed'?`<button class="action-btn" onclick="usarModeloParaGerar('${m.id}')"
            style="font-size:0.7rem;padding:0.2rem 0.5rem">⚡ Gerar</button>`:''}
          ${m.status==='failed'?`<button class="action-btn" onclick="retreinarModelo('${m.id}')"
            style="font-size:0.7rem;padding:0.2rem 0.5rem;border-color:var(--yellow);color:var(--yellow)">↻ Retreinar</button>`:''}
          <button class="action-btn" onclick="deleteModelo('${m.id}','${esc(m.nome)}')"
            style="font-size:0.7rem;padding:0.2rem 0.5rem;border-color:var(--red);color:var(--red)">${deleteLabel}</button>
        </td>
      </tr>`;
      if (isExpanded) {
        const p = m.parametros || {};
        const met2 = m.metricas || {};
        const arquivo = m.arquivo_modelo ? m.arquivo_modelo.split('/').pop() : '—';
        const paramRows = [
          ['Épocas definidas', p.epochs ?? '—'], ['Janela', p.window_size ?? '—'],
          ['Seed', p.seed ?? '—'], ['Concursos', p.n_draws || 'todos'],
        ].map(([k,v]) => `<span style="color:var(--muted)">${k}:</span> <b>${v}</b>`).join(' · ');
        const metRows = Object.entries(met2)
          .filter(([k]) => !['val_loss_final','epochs_trained'].includes(k))
          .map(([k,v]) => `<span style="color:var(--muted)">${k}:</span> <b>${typeof v === 'number' ? v.toFixed(5) : v}</b>`)
          .join(' · ');
        const exportJson = JSON.stringify({ nome: m.nome, tipo_config: m.tipo_config, parametros: m.parametros || {} }, null, 2);
        const exportSafe = exportJson.replace(/'/g, "\\'").replace(/\n/g, '\\n');
        html += `<tr style="background:rgba(255,255,255,0.02)"><td colspan="7" style="padding:0.5rem 1rem 0.75rem;font-size:0.7rem;border-top:none">
          <div style="display:flex;flex-direction:column;gap:0.25rem">
            <div>${paramRows}</div>
            ${metRows ? `<div>${metRows}</div>` : ''}
            <div style="color:var(--dim)">Arquivo: <code style="font-size:0.65rem">${esc(arquivo)}</code></div>
            ${m.criado_em ? `<div style="color:var(--dim)">Criado: ${new Date(m.criado_em).toLocaleString('pt-BR')}${m.concluido_em ? ' · Concluído: ' + new Date(m.concluido_em).toLocaleString('pt-BR') : ''}</div>` : ''}
            <div style="margin-top:0.25rem">
              <button onclick="navigator.clipboard.writeText('${exportSafe}').then(()=>showToast('Config copiada','success'))"
                style="font-size:0.62rem;padding:1px 6px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer">⎘ Copiar config JSON</button>
            </div>
          </div>
        </td></tr>`;
      }
    }
    html += `</tbody></table>`;
    if (remaining > 0) {
      html += `<div style="text-align:center;margin-top:0.5rem">
        <button class="action-btn" onclick="_verMaisLista()"
          style="font-size:0.72rem;padding:0.25rem 0.75rem">
          Ver mais ${Math.min(remaining, LISTA_PAGE_SIZE)} de ${remaining} restantes
        </button>
      </div>`;
    }
  }
  html += `</div>`;

  panel.innerHTML = html;
}

function _sortLista(key) {
  if (_predState.listaSort.key === key) {
    _predState.listaSort.dir *= -1;
  } else {
    _predState.listaSort = { key, dir: key === 'val_loss' ? 1 : -1 };
  }
  renderModLista();
}

function _filtroLista(status) {
  _predState.listaFiltroStatus = status;
  _predState.listaPage = 0;
  renderModLista();
}

function _verMaisLista() {
  _predState.listaPage = (_predState.listaPage || 0) + 1;
  renderModLista();
}

function _toggleModelExpand(id) {
  _predState.expandedModelId = _predState.expandedModelId === id ? null : id;
  renderModLista();
}

async function renomearModelo(id, nomeAtual) {
  const novo = prompt('Novo nome para o modelo:', nomeAtual);
  if (!novo || novo.trim() === nomeAtual) return;
  try {
    const r = await fetch(`/api/treinos/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nome: novo.trim() }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erro ao renomear');
    showToast(`Renomeado para "${data.nome}"`, 'success');
    await loadModelosAndRender();
  } catch(e) {
    showToast(`Erro: ${e.message}`, 'error');
  }
}

function _buscaLista(val) {
  _predState.listaBusca = val;
  _predState.listaPage = 0;
  renderModLista();
  // restore focus and cursor
  requestAnimationFrame(() => {
    const el = document.getElementById('listaBuscaInput');
    if (el) { el.focus(); el.setSelectionRange(val.length, val.length); }
  });
}

async function _limparFalhas() {
  const falhos = (_predState.modelos || []).filter(m => m.status === 'failed' || m.status === 'cancelled');
  if (!falhos.length) return;
  if (!confirm(`Apagar ${falhos.length} modelo(s) com status failed/cancelled?`)) return;
  let erros = 0;
  for (const m of falhos) {
    try {
      const r = await fetch(`/api/treinos/${m.id}`, { method: 'DELETE' });
      if (!r.ok) erros++;
    } catch { erros++; }
  }
  showToast(erros ? `${falhos.length - erros} apagados, ${erros} erro(s).` : `${falhos.length} modelos apagados.`, erros ? 'error' : 'success');
  await loadModelosAndRender();
}

async function _recalcBacktest() {
  const input = document.getElementById('backtestLastN');
  const val = input ? parseInt(input.value) : 120;
  if (!isNaN(val) && val >= 10 && val <= 500) {
    _predState.backtestLastN = val;
  }
  try {
    const res = await fetch(`/api/models/quality?last_n=${_predState.backtestLastN}`);
    const data = await res.json();
    _predState.qualidade = data.models || [];
  } catch(e) { _predState.qualidade = []; }
  renderModLista();
}

function usarModeloParaGerar(id) {
  _predState.gerarModeloId = id;
  showModelosSubTab('gerar');
}

function _usarMelhorModelo() {
  const qual = _predState.qualidade || [];
  if (!qual.length) { showToast('Sem dados de backtest para comparar.', 'error'); return; }
  const best = qual.reduce((a, b) => (b.mean_hits ?? 0) > (a.mean_hits ?? 0) ? b : a);
  // best.model is the approach string like "neural_<treino_id>_<nome>"
  const completed = (_predState.modelos || []).filter(m => m.status === 'completed');
  // match by treino_id substring in approach name
  const match = completed.find(m => best.model && best.model.includes(m.id)) || completed[0];
  if (!match) { showToast('Nenhum modelo concluído encontrado.', 'error'); return; }
  _predState.gerarModeloId = match.id;
  showModelosSubTab('gerar');
  showToast(`Modelo selecionado: ${match.nome} (${best.mean_hits?.toFixed(2)} hits médios)`, 'success');
}

function retreinarModelo(id) {
  const m = (_predState.modelos || []).find(t => t.id === id);
  if (!m) return;
  const params = m.parametros || {};

  // pre-fill state and switch to Treinar
  _predState.selectedConfig = m.tipo_config || 'base';
  showModelosSubTab('treinar');

  // after render, populate the form fields
  requestAnimationFrame(() => {
    const nome = document.getElementById('predNome');
    const epocas = document.getElementById('predEpocas');
    const janela = document.getElementById('predJanela');
    const seed   = document.getElementById('predSeed');
    const concursos = document.getElementById('predConcursos');
    if (nome)      nome.value      = m.nome || '';
    if (epocas)    epocas.value    = params.epochs     ?? 40;
    if (janela)    janela.value    = params.window_size ?? 50;
    if (seed)      seed.value      = params.seed        ?? 42;
    if (concursos) concursos.value = params.n_draws     ?? 0;
    nome?.focus();
  });
}

async function deleteModelo(id, nome) {
  const m = (_predState.modelos || []).find(t => t.id === id);
  const isRunning = m && m.status === 'running';
  const msg = isRunning
    ? `Cancelar e apagar o modelo "${nome}"?\nO treinamento em andamento será interrompido e o registro removido.`
    : `Apagar o modelo "${nome}"?\nEsta ação remove o registro e o arquivo .keras do disco.`;
  if (!confirm(msg)) return;
  try {
    const r = await fetch(`/api/treinos/${id}`, { method: 'DELETE' });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Erro ao apagar');
    showToast(`Modelo "${nome}" apagado.`, 'success');
    await loadModelosAndRender();
  } catch (e) {
    showToast(`Erro: ${e.message}`, 'error');
  }
}

// ── Gerar ──────────────────────────────────────────────────────
function renderPredGerar() {
  const panel = document.getElementById('mod-gerar');
  if (!panel) return;
  const completed = (_predState.modelos||[]).filter(m => m.status==='completed');
  const sel = _predState.gerarModeloId;
  panel.innerHTML = `
    <h3 style="font-size:0.85rem;font-weight:600;margin-bottom:0.75rem">Gerar Jogo</h3>
    <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:0.75rem;margin-bottom:1rem;align-items:end">
      <div class="pred-param">
        <label>Modelo treinado</label>
        <select id="gerarModeloSelect">
          <option value="">— selecionar —</option>
          ${completed.map(m=>`<option value="${m.id}"${m.id===sel?' selected':''}>${esc(m.nome)} (${esc(m.tipo_config)})</option>`).join('')}
        </select>
      </div>
      <div class="pred-param"><label>Nº de jogos</label><input type="number" id="gerarNJogos" value="3" min="1" max="20"></div>
      <div class="pred-param">
        <label>Números por jogo</label>
        <select id="gerarNNumeros">
          ${[11,12,13,14,15].map(n=>`<option value="${n}"${n===15?' selected':''}>${n} números</option>`).join('')}
        </select>
      </div>
      <div class="pred-param">
        <label>Concurso alvo</label>
        <input type="number" id="gerarConcursoAlvo" min="1"
          value="${(_predState.lastConcurso||0)+1}"
          placeholder="próximo">
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap">
      <button class="action-btn" id="gerarBtn" onclick="gerarJogos()"
        style="background:var(--accent-dim);border-color:var(--accent);color:var(--accent);font-weight:600">⚡ Gerar Jogos</button>
      ${(_predState.qualidade||[]).length > 0 ? `<button class="action-btn" onclick="_usarMelhorModelo()"
        style="font-size:0.72rem;padding:0.2rem 0.5rem" title="Selecionar modelo com mais hits médios no backtest">🏆 Melhor modelo</button>` : ''}
    </div>
    <div class="pred-warning">⚠️ Resultados experimentais e estatísticos — não garantem acertos.</div>
    <div id="gerarResultados"></div>
    <div id="gerarRecentes"></div>`;
}

async function gerarJogos() {
  const modeloId = document.getElementById('gerarModeloSelect').value;
  if (!modeloId) { alert('Selecione um modelo treinado.'); return; }
  const btn = document.getElementById('gerarBtn');
  btn.disabled = true; btn.textContent = '⏳ Gerando...';
  const n_jogos   = parseInt(document.getElementById('gerarNJogos').value)   || 3;
  const n_numeros = parseInt(document.getElementById('gerarNNumeros').value)  || 15;
  const concurso_alvo = parseInt(document.getElementById('gerarConcursoAlvo').value) || null;
  try {
    const r = await fetch(`/api/treinos/${modeloId}/gerar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ n_jogos, n_numeros, ...(concurso_alvo ? { concurso_alvo } : {}) }),
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderJogos(data);
    _loadGerarRecentes();
  } catch (e) {
    document.getElementById('gerarResultados').innerHTML =
      `<div style="color:var(--red);margin-top:0.5rem">❌ ${esc(e.message)}</div>`;
  } finally { btn.disabled = false; btn.textContent = '⚡ Gerar Jogos'; }
}

async function _loadGerarRecentes() {
  const div = document.getElementById('gerarRecentes');
  if (!div) return;
  try {
    const r = await fetch('/api/jogos-gerados?limit=6');
    const items = await r.json();
    // skip the first item (just generated), show next 2
    const prev = Array.isArray(items) ? items.slice(1, 3) : [];
    if (prev.length === 0) { div.innerHTML = ''; return; }
    let html = `<div style="margin-top:1rem;border-top:1px solid var(--border);padding-top:0.75rem">
      <div style="font-size:0.72rem;color:var(--muted);margin-bottom:0.5rem">Gerações anteriores</div>`;
    for (const item of prev) {
      const dt = item.criado_em ? new Date(item.criado_em).toLocaleString('pt-BR') : '—';
      const jogosArr = Array.isArray(item.jogos) ? item.jogos : [];
      html += `<div style="margin-bottom:0.5rem">
        <div style="font-size:0.65rem;color:var(--dim);margin-bottom:0.2rem">
          ${esc(item.treino_nome||item.treino_id)} · concurso ${item.concurso} · ${dt}
        </div>`;
      for (const jogo of jogosArr) {
        html += `<div class="pred-balls" style="display:inline-flex;gap:2px;margin-right:0.5rem;margin-bottom:2px">
          ${jogo.map(n=>`<span class="ball${n>12?' high':''}" style="opacity:0.6">${String(n).padStart(2,'0')}</span>`).join('')}
        </div>`;
      }
      html += `</div>`;
    }
    html += `</div>`;
    div.innerHTML = html;
  } catch(e) { div.innerHTML = ''; }
}

function renderJogos(data) {
  const div = document.getElementById('gerarResultados');
  if (!data.jogos || !data.jogos.length) {
    div.innerHTML = '<div style="color:var(--muted);margin-top:0.5rem">Nenhum jogo retornado.</div>'; return;
  }
  let html = `<div style="font-size:0.72rem;color:var(--muted);margin-top:0.5rem;margin-bottom:0.5rem">
    Concurso alvo: <b style="color:var(--text)">${data.concurso}</b> ·
    Modelo: <b style="color:var(--accent)">${esc(data.treino_nome||data.treino_id)}</b>
  </div><div class="pred-jogos-grid">`;
  data.jogos.forEach((jogo, i) => {
    html += `<div class="pred-jogo-card">
      <div class="pred-jogo-title">Jogo ${i+1} — ${jogo.length} números</div>
      <div class="pred-balls">${jogo.map(n=>`<span class="ball${n>12?' high':''}">${String(n).padStart(2,'0')}</span>`).join('')}</div>
    </div>`;
  });
  html += '</div>';

  // frequency heatmap across all generated games
  const freq = {};
  data.jogos.forEach(jogo => jogo.forEach(n => { freq[n] = (freq[n] || 0) + 1; }));
  const maxFreq = Math.max(...Object.values(freq), 1);
  let heatHtml = '<div style="margin-top:0.75rem"><div style="font-size:0.65rem;color:var(--dim);margin-bottom:0.3rem">Frequência nos jogos gerados</div><div style="display:flex;gap:3px;flex-wrap:wrap">';
  for (let n = 1; n <= 25; n++) {
    const f = freq[n] || 0;
    const alpha = f ? 0.25 + (f / maxFreq) * 0.75 : 0.08;
    heatHtml += `<div title="${n}: ${f}x" style="width:22px;height:22px;border-radius:4px;background:rgba(96,165,250,${alpha.toFixed(2)});display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:${f===maxFreq?700:400};color:${f===maxFreq?'#fff':'rgba(255,255,255,0.7)'}">${n}</div>`;
  }
  heatHtml += '</div></div>';
  html += heatHtml;

  // show last real draw for reference
  const ld = _predState.lastDraw;
  if (ld && Array.isArray(ld.dezenas) && ld.dezenas.length) {
    html += `<div style="margin-top:0.75rem;padding:0.5rem 0.75rem;background:rgba(255,255,255,0.04);border-radius:6px;border:1px solid var(--border)">
      <div style="font-size:0.65rem;color:var(--dim);margin-bottom:0.3rem">Último sorteio real — concurso ${ld.concurso}${ld.data ? ' · ' + ld.data : ''}</div>
      <div class="pred-balls" style="display:inline-flex;gap:2px;opacity:0.75">
        ${ld.dezenas.map(n=>`<span class="ball${n>12?' high':''}">${String(n).padStart(2,'0')}</span>`).join('')}
      </div>
    </div>`;
  }

  div.innerHTML = html;
}

        <select id="cmpA">

async function compararModelos() {
  const a = document.getElementById('cmpA').value;
  const b = document.getElementById('cmpB').value;
  if (!a||!b)   { alert('Selecione dois modelos.'); return; }
  if (a===b)    { alert('Selecione modelos diferentes.'); return; }
  const div = document.getElementById('cmpResultados');
  div.innerHTML = '<div style="color:var(--muted);font-size:0.78rem">Carregando...</div>';
  try {
    const r = await fetch(`/api/treinos/comparar?a=${a}&b=${b}`);
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    renderComparacao(data);
  } catch(e) {
    div.innerHTML = `<div style="color:var(--red);font-size:0.78rem">❌ ${esc(e.message)}</div>`;
  }
}

function renderComparacao(data) {
  const div = document.getElementById('cmpResultados');
  const ma = data.a.metricas||{}; const mb = data.b.metricas||{};
  const dl = data.delta.val_loss_final;
  const dlClass = dl==null?'':(dl<0?'delta-better':'delta-worse');
  const dlSign  = dl==null?'':(dl<0?'▼ ':'▲ ');

  // find backtest quality for each model (match by treino_id substring in approach name)
  const qual = _predState.qualidade || [];
  const qa = qual.find(q => q.model && q.model.includes(data.a.id)) || null;
  const qb = qual.find(q => q.model && q.model.includes(data.b.id)) || null;
  const hitsA = qa?.mean_hits != null ? qa.mean_hits.toFixed(2) : '—';
  const hitsB = qb?.mean_hits != null ? qb.mean_hits.toFixed(2) : '—';
  const impA  = qa?.improvement_pct != null ? `${qa.improvement_pct > 0 ? '+' : ''}${qa.improvement_pct.toFixed(1)}%` : '—';
  const impB  = qb?.improvement_pct != null ? `${qb.improvement_pct > 0 ? '+' : ''}${qb.improvement_pct.toFixed(1)}%` : '—';
  const pA    = qa?.p_value != null ? qa.p_value.toFixed(4) : '—';
  const pB    = qb?.p_value != null ? qb.p_value.toFixed(4) : '—';
  const hitsDelta = (qa?.mean_hits != null && qb?.mean_hits != null)
    ? ((qa.mean_hits - qb.mean_hits) > 0 ? '+' : '') + (qa.mean_hits - qb.mean_hits).toFixed(2) : '—';
  const hitsDeltaClass = (qa?.mean_hits != null && qb?.mean_hits != null)
    ? (qa.mean_hits > qb.mean_hits ? 'delta-better' : qa.mean_hits < qb.mean_hits ? 'delta-worse' : '') : '';

  div.innerHTML = `
    <table class="pred-compare-table"><thead>
      <tr><th>Métrica</th><th>${esc(data.a.nome)}</th><th>${esc(data.b.nome)}</th><th>Delta (A−B)</th></tr>
    </thead><tbody>
      <tr><td style="color:var(--muted)">Tipo</td><td>${esc(data.a.tipo_config)}</td><td>${esc(data.b.tipo_config)}</td><td>—</td></tr>
      <tr>
        <td style="color:var(--muted)">Val Loss</td>
        <td style="font-family:monospace">${ma.val_loss_final!=null?ma.val_loss_final.toFixed(5):'—'}</td>
        <td style="font-family:monospace">${mb.val_loss_final!=null?mb.val_loss_final.toFixed(5):'—'}</td>
        <td class="${dlClass}" style="font-family:monospace">${dl!=null?dlSign+Math.abs(dl).toFixed(5):'—'}</td>
      </tr>
      <tr>
        <td style="color:var(--muted)">Épocas</td>
        <td>${ma.epochs_trained??'—'}</td><td>${mb.epochs_trained??'—'}</td>
        <td>${data.delta.epochs_trained!=null?(data.delta.epochs_trained>=0?'+':'')+data.delta.epochs_trained:'—'}</td>
      </tr>
      <tr>
        <td style="color:var(--muted)">Hits médios</td>
        <td style="font-weight:600">${hitsA}</td><td style="font-weight:600">${hitsB}</td>
        <td class="${hitsDeltaClass}">${hitsDelta}</td>
      </tr>
      <tr>
        <td style="color:var(--muted)">vs Baseline</td>
        <td style="color:${qa?.improvement_pct>0?'var(--green)':qa?.improvement_pct<0?'var(--red)':'var(--muted)'}">${impA}</td>
        <td style="color:${qb?.improvement_pct>0?'var(--green)':qb?.improvement_pct<0?'var(--red)':'var(--muted)'}">${impB}</td>
        <td>—</td>
      </tr>
      <tr>
        <td style="color:var(--muted)">p-value</td>
        <td style="font-family:monospace">${pA}</td><td style="font-family:monospace">${pB}</td><td>—</td>
      </tr>
      <tr>
        <td style="color:var(--muted)">Criado em</td>
        <td style="color:var(--dim)">${data.a.criado_em?new Date(data.a.criado_em).toLocaleDateString('pt-BR'):'—'}</td>
        <td style="color:var(--dim)">${data.b.criado_em?new Date(data.b.criado_em).toLocaleDateString('pt-BR'):'—'}</td>
        <td>—</td>
      </tr>
    </tbody></table>
    <div style="font-size:0.7rem;color:var(--dim);margin-top:0.5rem">
      Val Loss menor = melhor. Hits médios maior = melhor. ▼ verde = Modelo A melhor que B.
      ${!qa && !qb ? '<br>Sem dados de backtest — execute via <b>📋 Lista</b> para ver hits.' : ''}
    </div>`;
}

// ── Histórico de jogos gerados ─────────────────────────────────
let _historicoData = [];
let _historicoFiltroModelo = '';

async function renderPredHistorico() {
  const panel = document.getElementById('mod-historico');
  if (!panel) return;
  panel.innerHTML = `<div style="color:var(--muted);font-size:0.78rem;padding:1rem 0">Carregando histórico…</div>`;
  try {
    const r = await fetch('/api/jogos-gerados');
    _historicoData = await r.json();
    _renderHistoricoPanel(panel);
  } catch(e) {
    panel.innerHTML = `<div style="color:var(--red);font-size:0.78rem;padding:1rem 0">❌ Erro ao carregar histórico: ${esc(e.message)}</div>`;
  }
}

function _historicoStats(items) {
  let totalJogos = 0, acertosAll = [], melhor = null;
  for (const item of items) {
    const arr = Array.isArray(item.jogos) ? item.jogos : [];
    totalJogos += arr.length;
    const ac = item.acertos_por_jogo || [];
    for (const h of ac) {
      acertosAll.push(h);
      if (melhor === null || h > melhor) melhor = h;
    }
  }
  const media = acertosAll.length
    ? (acertosAll.reduce((s, v) => s + v, 0) / acertosAll.length).toFixed(2)
    : null;
  return { totalGeracoes: items.length, totalJogos, media, melhor, comResultado: acertosAll.length };
}

function _renderHistoricoPanel(panel) {
  const jogos = _historicoData;
  if (!Array.isArray(jogos) || jogos.length === 0) {
    panel.innerHTML = `<div style="padding:2rem 0;text-align:center;color:var(--muted)">
      Nenhum jogo gerado ainda. Use <b>⚡ Gerar</b> para criar apostas a partir de um modelo treinado.</div>`;
    return;
  }

  // unique model names for filter
  const modelos = [...new Set(jogos.map(j => j.treino_nome || j.treino_id))].sort();
  const filtered = _historicoFiltroModelo
    ? jogos.filter(j => (j.treino_nome || j.treino_id) === _historicoFiltroModelo)
    : jogos;

  const stats = _historicoStats(filtered);
  const statsHtml = `
    <div style="display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:0.75rem">
      <div style="font-size:0.72rem;color:var(--muted)">Gerações: <b style="color:var(--text)">${stats.totalGeracoes}</b></div>
      <div style="font-size:0.72rem;color:var(--muted)">Jogos: <b style="color:var(--text)">${stats.totalJogos}</b></div>
      ${stats.media != null ? `<div style="font-size:0.72rem;color:var(--muted)">Média acertos: <b style="color:var(--accent)">${stats.media}</b></div>` : ''}
      ${stats.melhor != null ? `<div style="font-size:0.72rem;color:var(--muted)">Melhor: <b style="color:var(--green)">${stats.melhor}/15</b></div>` : ''}
      ${stats.comResultado > 0 ? `<div style="font-size:0.72rem;color:var(--dim)">${stats.comResultado} jogo${stats.comResultado>1?'s':''} com resultado</div>` : ''}
    </div>`;

  let html = `
    <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;flex-wrap:wrap">
      <div class="modelos-section-title" style="margin:0">🗂 Histórico de Jogos Gerados</div>
      <select id="historicoFiltroModelo" onchange="_onHistoricoFiltro()"
        style="font-size:0.72rem;padding:0.2rem 0.4rem;background:var(--surface);color:var(--text);border:1px solid var(--border);border-radius:4px">
        <option value="">Todos os modelos</option>
        ${modelos.map(m => `<option value="${esc(m)}"${_historicoFiltroModelo===m?' selected':''}>${esc(m)}</option>`).join('')}
      </select>
      <button class="action-btn" onclick="_exportHistoricoCSV()"
        style="font-size:0.72rem;padding:0.2rem 0.5rem;margin-left:auto">⬇ CSV</button>
    </div>
    ${statsHtml}`;

  if (filtered.length === 0) {
    html += `<div style="color:var(--muted);font-size:0.78rem">Nenhum jogo para o modelo selecionado.</div>`;
    panel.innerHTML = html;
    return;
  }

  html += `<table class="pred-table"><thead><tr>
    <th>Data</th><th>Modelo</th><th>Concurso</th><th>Jogos</th>
  </tr></thead><tbody>`;

  for (const item of filtered) {
    const dt = item.criado_em ? new Date(item.criado_em).toLocaleString('pt-BR') : '—';
    const jogosArr = Array.isArray(item.jogos) ? item.jogos : [];
    const acertos  = item.acertos_por_jogo || [];
    const real     = item.dezenas_reais;

    const jogosHtml = jogosArr.map((jogo, i) => {
      const hits = acertos[i];
      const hasReal = hits != null;
      const hitColor = hasReal ? (hits >= 13 ? 'var(--green)' : hits >= 11 ? 'var(--yellow)' : 'var(--red)') : '';
      const badge = hasReal
        ? `<span style="font-size:0.6rem;font-weight:700;padding:1px 4px;border-radius:3px;background:rgba(255,255,255,0.07);color:${hitColor};margin-left:4px">${hits}/15 ✓</span>`
        : '';
      const balls = Array.isArray(jogo)
        ? jogo.map(n => {
            const isHit = real && real.includes(n);
            return `<span class="ball${n>12?' high':''}" style="${isHit?'outline:1px solid var(--green);opacity:1':'opacity:0.75'}">${String(n).padStart(2,'0')}</span>`;
          }).join('')
        : '—';
      const copyData = Array.isArray(jogo) ? jogo.join('-') : '';
      const copyBtn = `<button onclick="navigator.clipboard.writeText('${copyData}').then(()=>showToast('Dezenas copiadas','success'))"
        style="font-size:0.6rem;padding:1px 5px;background:none;border:1px solid var(--border);border-radius:3px;color:var(--muted);cursor:pointer;margin-left:5px" title="Copiar dezenas">⎘</button>`;
      return `<div style="margin-bottom:0.35rem;display:flex;align-items:center">
        <span style="font-size:0.65rem;color:var(--muted);margin-right:0.3rem;min-width:18px">J${i+1}</span>
        <span class="pred-balls" style="display:inline-flex;gap:2px">${balls}</span>${badge}${copyBtn}
      </div>`;
    }).join('');

    html += `<tr>
      <td style="color:var(--dim);white-space:nowrap">${dt}</td>
      <td style="font-weight:600">${esc(item.treino_nome || item.treino_id)}</td>
      <td style="font-family:monospace;text-align:center">${item.concurso}</td>
      <td>${jogosHtml}</td>
    </tr>`;
  }
  html += `</tbody></table>`;
  panel.innerHTML = html;
}

function _onHistoricoFiltro() {
  const sel = document.getElementById('historicoFiltroModelo');
  _historicoFiltroModelo = sel ? sel.value : '';
  const panel = document.getElementById('mod-historico');
  if (panel) _renderHistoricoPanel(panel);
}

function _exportHistoricoCSV() {
  const jogos = _historicoFiltroModelo
    ? _historicoData.filter(j => (j.treino_nome || j.treino_id) === _historicoFiltroModelo)
    : _historicoData;
  const rows = [['data', 'modelo', 'concurso', 'jogo', 'dezenas', 'acertos']];
  for (const item of jogos) {
    const dt = item.criado_em ? new Date(item.criado_em).toLocaleString('pt-BR') : '';
    const modelo = item.treino_nome || item.treino_id || '';
    const arr = Array.isArray(item.jogos) ? item.jogos : [];
    const acertos = item.acertos_por_jogo || [];
    arr.forEach((jogo, i) => {
      rows.push([dt, modelo, item.concurso, `J${i+1}`, Array.isArray(jogo) ? jogo.join(' ') : '', acertos[i] ?? '']);
    });
  }
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'jogos_gerados.csv'; a.click();
  URL.revokeObjectURL(url);
}

// MODELOS — helpers
// ═══════════════════════════════════════════════════════════════

const MODELO_CONFIG_LABELS = {
  base: 'base+temp',
  lua: '+lua',
  clima: '+clima',
  lua_clima: '+lua+clima',
};

let _treinoPoller = null;
let _treinoTaskId = null;
let _treinoPollOffset = 0;
let _treinoTotalEpochs = 100;
let _treinoEpochLog = [];   // [{epoch, ts}] for ETA calculation

function openTreinoModal(taskId, configLabel, epochsHint) {
  _treinoTaskId = taskId;
  _treinoPollOffset = 0;
  _treinoTotalEpochs = epochsHint || parseInt(document.getElementById('predEpocas')?.value) || 100;
  _treinoEpochLog = [];

  document.getElementById('treinoModalTitle').textContent = `Treinando (${configLabel})…`;
  document.getElementById('treinoModalStatus').textContent = '';
  document.getElementById('treinoProgressFill').style.width = '0%';
  document.getElementById('treinoEpochLabel').textContent = 'Iniciando…';
  document.getElementById('treinoLog').innerHTML = '';
  document.getElementById('treinoCancelBtn').disabled = false;
  document.getElementById('treinoModalOverlay').classList.add('visible');

  _treinoPoller = setInterval(() => _pollTreino(), 2000);
}

async function _pollTreino() {
  if (!_treinoTaskId) return;
  try {
    const res = await fetch(`/api/jobs/${_treinoTaskId}/poll?offset=${_treinoPollOffset}`);
    const data = await res.json();

    if (data.lines && data.lines.length > 0) {
      _treinoPollOffset = data.next_offset;
      _appendTreinoLog(data.lines);
      _updateEpochFromLog(data.lines);
    }

    if (data.done) {
      clearInterval(_treinoPoller);
      _treinoPoller = null;
      _finishTreinoModal(data.success !== false);
    }
  } catch (e) {
    logClient('warn', 'Falha no poll do treino', { error: e.message });
  }
}

function _appendTreinoLog(lines) {
  const log = document.getElementById('treinoLog');
  for (const line of lines) {
    if (!line) continue;
    const div = document.createElement('div');
    if (/^✅|sucesso|conclu/i.test(line)) div.className = 'log-success';
    else if (/^❌|erro|error|Traceback/i.test(line)) div.className = 'log-error';
    else if (/^\$/.test(line)) div.className = 'log-cmd';
    div.textContent = line;
    log.appendChild(div);
  }
  while (log.children.length > 60) log.removeChild(log.firstChild);
  log.scrollTop = log.scrollHeight;
}

function _updateEpochFromLog(lines) {
  for (const line of [...lines].reverse()) {
    const m = line.match(/[Ee]poch[\s:]+(\d+)[\s\/\\]+(\d+)/);
    if (m) {
      const cur = parseInt(m[1]);
      const total = parseInt(m[2]) || _treinoTotalEpochs;
      const pct = Math.min(100, Math.round((cur / total) * 100));
      document.getElementById('treinoProgressFill').style.width = `${pct}%`;

      // ETA calculation using last 5 epoch intervals
      _treinoEpochLog.push({ epoch: cur, ts: Date.now() });
      if (_treinoEpochLog.length > 6) _treinoEpochLog.shift();
      let etaStr = '';
      if (_treinoEpochLog.length >= 2) {
        const samples = _treinoEpochLog;
        const msPerEpoch = (samples[samples.length-1].ts - samples[0].ts) / (samples[samples.length-1].epoch - samples[0].epoch);
        if (msPerEpoch > 0 && cur < total) {
          const remSec = Math.round(((total - cur) * msPerEpoch) / 1000);
          etaStr = remSec < 60 ? ` · ETA ${remSec}s` : ` · ETA ${Math.ceil(remSec/60)}min`;
        }
      }
      document.getElementById('treinoEpochLabel').textContent = `Epoch ${cur}/${total} · ${pct}%${etaStr}`;
      return;
    }
  }
}

function _finishTreinoModal(success) {
  const title = document.getElementById('treinoModalTitle');
  const status = document.getElementById('treinoModalStatus');
  const fill = document.getElementById('treinoProgressFill');
  document.getElementById('treinoCancelBtn').disabled = true;

  if (success) {
    title.textContent = '✅ Treino concluído';
    fill.style.width = '100%';
    fill.style.background = 'var(--green)';
    status.textContent = 'Recarregando modelos…';
    if (STATE.activeTab !== 'modelos') {
      showToast('✅ Treino concluído! Acesse a aba Modelos para ver o resultado.', 'success');
    }
    setTimeout(() => {
      closeTreinoModal();
      loadModelosAndRender();
      showModelosSubTab('lista');
    }, 1800);
  } else {
    title.textContent = '❌ Treino falhou';
    status.textContent = 'Veja o log para detalhes';
    document.getElementById('treinoCancelBtn').textContent = 'Fechar';
    document.getElementById('treinoCancelBtn').disabled = false;
    document.getElementById('treinoCancelBtn').onclick = closeTreinoModal;
    if (STATE.activeTab !== 'modelos') {
      showToast('❌ Treino falhou. Verifique o log na aba Modelos.', 'error');
    }
  }
}

async function cancelTreino() {
  if (!_treinoTaskId) return;
  document.getElementById('treinoCancelBtn').disabled = true;
  try {
    await fetch(`/api/jobs/${_treinoTaskId}/cancel`, { method: 'POST' });
  } catch (e) { /* silencioso — pode já ter terminado */ }
  clearInterval(_treinoPoller);
  _treinoPoller = null;
  closeTreinoModal();
}

function closeTreinoModal() {
  document.getElementById('treinoModalOverlay').classList.remove('visible');
  const btn = document.getElementById('modTreinoBtn');
  if (btn) { btn.disabled = false; btn.textContent = '▶ Iniciar Treino'; }
  document.getElementById('treinoCancelBtn').onclick = cancelTreino;
  document.getElementById('treinoCancelBtn').textContent = '✕ Cancelar';
  _treinoTaskId = null;
  _treinoPollOffset = 0;
}
