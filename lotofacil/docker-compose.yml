services:
  dashboard:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
    volumes:
      - lotofacil_dados:/app/dados
      - lotofacil_saida:/app/saida
      - lotofacil_lab_models:/app/src/lotofacil/experimentos/saved_models
    restart: unless-stopped

volumes:
  lotofacil_dados:
  lotofacil_saida:
  lotofacil_lab_models:
