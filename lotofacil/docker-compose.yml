services:
  dashboard:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
    volumes:
      - lotofacil_dados:/app/dados   # sorteios, clima, lua — persiste entre deploys
      - lotofacil_saida:/app/saida   # modelos, predições, logs — persiste entre deploys
    restart: unless-stopped

volumes:
  lotofacil_dados:
  lotofacil_saida:
