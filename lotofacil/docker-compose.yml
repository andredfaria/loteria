services:
  dashboard:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DASHBOARD_HOST=0.0.0.0
      - DASHBOARD_PORT=5000
    volumes:
      - ./dados:/app/dados   # bind mount — diretório do host, sobrevive a down -v e system prune
      - ./saida:/app/saida   # bind mount — diretório do host, sobrevive a down -v e system prune
      - ./saida/lab_models:/app/src/lotofacil/experimentos/saved_models  # modelos lab persistidos
    restart: unless-stopped
